<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - NYMATE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Khusus Halaman Upload */
        .upload-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #F9F3D9;
        }

        .upload-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 50px 20px 20px;
            background-color: white;
            border-radius: 0 0 30px 30px;
        }

        .btn-cancel {
            color: #888;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-post {
            background-color: #FFD54F;
            border: none;
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
        }

        .upload-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* Kotak Preview Gambar */
        .preview-container {
            width: 100%;
            aspect-ratio: 1 / 1; /* Kotak Sempurna */
            background-color: #fff;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px dashed #A8D8EA;
            position: relative;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        #preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .placeholder-text {
            text-align: center;
            color: #A8D8EA;
        }

        .placeholder-text span {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }

        /* Input Deskripsi */
        .caption-area {
            width: 100%;
            min-height: 120px;
            background-color: white;
            border: none;
            border-radius: 20px;
            padding: 15px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            resize: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        /* Opsi Tambahan */
        .extra-options {
            margin-top: 20px;
        }

        .option-item {
            background-color: white;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #555;
        }

        .option-item span:last-child {
            color: #A8D8EA;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <form action="process_upload.php" method="POST" enctype="multipart/form-data" class="upload-page">
            
            <!-- Header -->
            <div class="upload-header">
                <a href="index.php" class="btn-cancel">Cancel</a>
                <h2 style="font-size: 18px;">New Post</h2>
                <button type="submit" class="btn-post">Post</button>
            </div>

            <!-- Body -->
            <div class="upload-body">
                
                <!-- Pilih Gambar -->
                <label for="file-upload" class="preview-container">
                    <img id="preview-img" src="#" alt="Preview">
                    <div id="placeholder-content" class="placeholder-text">
                        <span>📸</span>
                        <b>Add Photo</b>
                        <p style="font-size: 11px; margin-top: 5px;">Tap to browse your gallery</p>
                    </div>
                </label>
                <input type="file" id="file-upload" name="image" style="display: none;" accept="image/*" required onchange="showPreview(event)">

                <!-- Tulis Deskripsi -->
                <textarea class="caption-area" name="caption" placeholder="What's happening in your neighborhood? #AntiDengue #Nymate"></textarea>

                <!-- Fitur Tambahan (Opsional) -->
                <div class="extra-options">
                    <div class="option-item">
                        <span>📍 Add Location</span>
                        <span>Add ></span>
                    </div>
                    <div class="option-item">
                        <span>👥 Tag Friends</span>
                        <span>Add ></span>
                    </div>
                </div>

            </div>

            <!-- Navigasi Bawah tetap ada sebagai referensi -->
            <nav class="bottom-nav">
                <div class="nav-item">🏠</div>
                <div class="nav-item">📍</div>
                <div class="nav-item camera active">📷</div>
                <div class="nav-item">💬</div>
                <div class="nav-item">👤</div>
            </nav>

        </form>
    </div>

    <script>
        function showPreview(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function() {
                    const preview = document.getElementById('preview-img');
                    const placeholder = document.getElementById('placeholder-content');
                    const container = document.querySelector('.preview-container');
                    
                    preview.src = reader.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                    container.style.border = 'none'; // Hilangkan garis putus-putus saat ada gambar
                }
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
