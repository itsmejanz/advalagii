<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYMATE UI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body>

    <div class="mobile-container">
        <!-- Header Section -->
        <header class="header">
            <div class="map-bg"></div>
            <h1>HI, NYMATE!</h1>
            <p class="date">DD/MM/YYYY</p>
            
            <div class="counter-card">
                <div class="numbers">1 2 3 4 5</div>
                <p class="update-text">DENGUE DATA: LAST UPDATE 00:00:00</p>
            </div>
        </header>

        <!-- Search / Thought Bar -->
        <div class="thought-bar">
            <div class="avatar-mini">🔍</div>
            <input type="text" placeholder="Send your thoughts...">
        </div>

        <!-- Main Menu Buttons -->
       <div class="menu-container">
    <div class="menu-item purple">
        <div class="icon-circle">
            <span class="material-symbols-outlined">sports_esports</span>
            <p>EDU-GAME</p>
        </div>
    </div>

    <div class="menu-item blue">
        <div class="icon-circle">
            <span class="material-symbols-outlined">groups</span>
            <p>GATHERING</p>
        </div>
    </div>

    <div class="menu-item red">
        <div class="icon-circle">
            <span class="material-symbols-outlined">star</span>
            <p>REWARD</p>
        </div>
    </div>
</div>

        <!-- Feed Section -->
        <div class="feed-section">
            <div class="feed-tab">NYMO FEED</div>
            <div class="feed-content">
                <div class="post-header">
                    <div class="user-avatar"></div>
                    <div class="user-info">
                        <strong>@username</strong>
                        <p>THE NYMO SCANNER INDICATES THAT THIS LOCATION HAS A POTENTIAL RISK OF DENGUE, LETS START A GATHERING!</p>
                    </div>
                </div>
                <div class="post-images">
                    <div class="img-placeholder"></div>
                    <div class="img-placeholder"></div>
                </div>
                <button class="join-btn">JOIN GATHERING!</button>
            </div>
        </div>

        <!-- Bottom Navigation -->
       <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
        <span class="material-symbols-outlined">home</span>
    </a>
    <a href="peta.html" class="nav-item">
        <span class="material-symbols-outlined">location_on</span>
    </a>
    <a href="kamera.html" class="nav-item camera">
        <span class="material-symbols-outlined">photo_camera</span>
    </a>
    <a href="chat.html" class="nav-item">
        <span class="material-symbols-outlined">chat</span>
    </a>
    <a href="profile.html" class="nav-item">
        <span class="material-symbols-outlined">person</span>
    </a>
</nav>
    </div>

</body>
</html>
